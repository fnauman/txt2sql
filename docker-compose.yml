services:
  mariadb:
    image: mariadb:10.6
    container_name: text-to-sql-mariadb
    restart: unless-stopped
    ports:
      - "127.0.0.1:${DB_PORT:-3306}:3306"
    environment:
      MARIADB_ROOT_PASSWORD: "${MARIADB_ROOT_PASSWORD:-${DB_PASSWORD:-secret}}"
      MARIADB_DATABASE: "${DB_NAME:-demo_retail}"
    healthcheck:
      test: ["CMD-SHELL", "MYSQL_PWD=\"$${MARIADB_ROOT_PASSWORD}\" mariadb-admin ping -h 127.0.0.1 --silent"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - mariadb_data:/var/lib/mysql

volumes:
  mariadb_data:
